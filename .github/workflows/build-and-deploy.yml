name: Build and deploy

# Builds the SPA (regenerating data first) and deploys it to GitHub Pages.
# Reusable: refresh-data.yml calls this on a schedule so deploys always carry
# fresh data without committing JSON back to the repo.

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # "Backend": regenerate static data. Keys stay in Actions secrets and are
      # never bundled into the static site. Missing keys → pipeline uses fixtures.
      - name: Refresh data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run pipeline

      - run: npm run build

      # enablement: true sets the Pages build type to "GitHub Actions" via the
      # API, so this works even if Pages was first enabled as "Deploy from a
      # branch" (the usual cause of deploys hanging on "deployment_queued").
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deploy
        uses: actions/deploy-pages@v4
