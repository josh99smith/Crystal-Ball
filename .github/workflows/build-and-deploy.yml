name: Build and deploy

# Builds the SPA (regenerating data first) and publishes it to the gh-pages
# branch with a plain git force-push. This avoids actions/deploy-pages entirely
# (no github-pages environment gate, no artifact step, no deployment queue) —
# the failure modes that previously blocked deploys.
#
# One-time setup: Settings → Pages → Source → "Deploy from a branch" →
# Branch: gh-pages, Folder: / (root).

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write # push to gh-pages

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # "Backend": regenerate static data. Keys stay in Actions secrets and are
      # never bundled into the static site. Missing keys → pipeline uses fixtures.
      - name: Refresh data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run pipeline

      - run: npm run build

      - name: Publish to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          touch dist/.nojekyll
          cd dist
          git init -q
          git checkout -q -b gh-pages
          git -c user.name="github-actions[bot]" \
              -c user.email="github-actions[bot]@users.noreply.github.com" \
              add -A
          git -c user.name="github-actions[bot]" \
              -c user.email="github-actions[bot]@users.noreply.github.com" \
              commit -qm "Deploy ${GITHUB_SHA} (run ${GITHUB_RUN_NUMBER})"
          git push -f \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            gh-pages
