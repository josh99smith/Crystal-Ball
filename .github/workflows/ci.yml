name: CI

# Quality gate: typecheck, tests, and build on every push / PR.
# Deployment is separate (build-and-deploy.yml).

on:
  push:
    branches-ignore: ["gh-pages"]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
